<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Wellness App</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8f8f6;
      color: #2c2c2a;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      text-align: center;
    }
    .icon {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: #E1F5EE;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
    }
    h1 {
      font-size: 20px;
      font-weight: 500;
      margin-bottom: 0.5rem;
      color: #2c2c2a;
    }
    p {
      font-size: 15px;
      color: #5f5e5a;
      line-height: 1.6;
      max-width: 320px;
      margin: 0 auto 2rem;
    }
    .tip {
      background: #fff;
      border: 0.5px solid rgba(0,0,0,0.1);
      border-radius: 12px;
      padding: 1rem 1.25rem;
      max-width: 320px;
      text-align: left;
    }
    .tip-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #888780;
      margin-bottom: 8px;
    }
    .tip-item {
      font-size: 14px;
      color: #444441;
      line-height: 1.7;
    }
    button {
      margin-top: 1.5rem;
      background: none;
      border: 0.5px solid #0F6E56;
      border-radius: 999px;
      padding: 8px 20px;
      font-size: 14px;
      color: #0F6E56;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="icon">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#0F6E56" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39M10.71 5.05A16 16 0 0 1 22.56 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/>
    </svg>
  </div>
  <h1>You're offline right now</h1>
  <p>No connection detected. Open the app once with a connection and all your activities will be saved for offline use.</p>

  <div class="tip">
    <div class="tip-label">While you wait</div>
    <div class="tip-item">
      Try box breathing on your own:<br>
      Breathe in for 4 counts,<br>
      hold for 4, out for 4, hold for 4.<br>
      Repeat 3–4 times.
    </div>
  </div>

  <button onclick="window.location.reload()">Try again</button>
</body>
</html>
